<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Flippy Bird Aesthetic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="login-screen" class="screen">
            <h1>Flippy Bird</h1>
            <input type="text" id="username" placeholder="Nama">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>

        <div id="menu-screen" class="screen" style="display:none;">
            <h2 id="welcome-text">Halo!</h2>
            <button onclick="startGame()">Play</button>
            <button onclick="showSkins()">Ganti Skin</button>
        </div>

        <div id="skin-screen" class="screen" style="display:none;">
            <h3>Pilih Karakter</h3>
            <div class="skin-options">
                <button onclick="setSkin('bird')">🐦 Burung</button>
                <button onclick="setSkin('cat')">🐱 Kucing</button>
                <button onclick="setSkin('spider')">🕷️ Laba-laba</button>
                <button onclick="setSkin('car')">🚗 Mobil</button>
            </div>
            <button onclick="backToMenu()">Kembali</button>
        </div>

        <canvas id="gameCanvas" width="400" height="600" style="display:none;"></canvas>
        <div id="score-display" style="display:none;">Skor: 0</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
